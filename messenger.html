<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat — #general</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#1e1f22}
:root{
  --bg:#313338;--sidebar:#2b2d31;--header:#2b2d31;--input-bg:#383a40;
  --msg-hover:#2e3035;--text:#dbdee1;--muted:#949ba4;--accent:#5865f2;
  --green:#23a559;--border:#1e1f22;--white:#fff;--card:#1e1f22;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center}
#app{display:flex;flex-direction:column;width:100%;max-width:960px;height:100vh;max-height:100vh;background:var(--bg);overflow:hidden}

/* ── Setup screen ── */
#setup-screen{display:flex;align-items:center;justify-content:center;flex:1;background:var(--bg)}
.setup-card{background:var(--sidebar);border-radius:12px;padding:36px;width:380px;border:1px solid #3f4147}
.setup-card h2{color:var(--white);font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:-.4px}
.setup-card .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.field-label{color:#b5bac1;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.setup-input{width:100%;background:var(--card);border:1.5px solid #3f4147;border-radius:5px;padding:11px 13px;color:var(--white);font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.setup-input:focus{border-color:var(--accent)}
.avatar-grid{display:flex;gap:10px;margin:8px 0 26px;flex-wrap:wrap}
.av-btn{width:58px;height:58px;border-radius:50%;background:var(--card);border:2.5px solid transparent;font-size:28px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.av-btn:hover{background:#2b2d31;border-color:#4f545c}
.av-btn.sel{border-color:var(--accent);background:#404775}
.join-btn{width:100%;background:var(--accent);border:none;border-radius:5px;padding:12px;color:var(--white);font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;letter-spacing:.2px}
.join-btn:hover:not(:disabled){background:#4752c4}
.join-btn:active:not(:disabled){transform:scale(.98)}
.join-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Chat layout ── */
#chat-screen{display:none;flex:1;flex-direction:column;overflow:hidden}
#top-bar{background:var(--header);height:48px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.channel-name{color:var(--white);font-size:15px;font-weight:700;display:flex;align-items:center;gap:5px}
.channel-name .hash{color:var(--muted);font-size:20px;font-weight:300;line-height:1}
.sep{width:1px;height:20px;background:#3f4147;margin:0 4px}
.topic{color:var(--muted);font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{background:#404775;color:#c9cdfb;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap}
.conn-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:12px}
.conn-badge.live{background:#1a3a2a;color:var(--green)}
.conn-badge.loading{background:#2a2a1a;color:#f0b232}
.conn-badge.err{background:#3a1a1a;color:#f04747}

#body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
#sidebar{width:220px;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0}
.sb-section{padding:18px 12px 6px;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.member-row{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:6px;margin:1px 5px;cursor:default;transition:background .1s}
.member-row:hover{background:#35373c}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.av .dot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2.5px solid var(--sidebar)}
.mb-info{min-width:0;flex:1}
.mb-name{color:#c4c9ce;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb-name.me{color:var(--white)}
.mb-tag{background:#404775;color:#c9cdfb;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:1px}
.mb-status{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#my-info{margin-top:auto;background:#232428;padding:10px 10px;display:flex;align-items:center;gap:9px;border-top:1px solid var(--border);flex-shrink:0}
.my-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--card)}
#my-name-sm{color:var(--white);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-status{color:var(--green);font-size:11px}

/* ── Main chat ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#msgs{flex:1;overflow-y:auto;padding:16px 0 4px}
#msgs::-webkit-scrollbar{width:6px}
#msgs::-webkit-scrollbar-thumb{background:#1a1b1e;border-radius:3px}
#msgs::-webkit-scrollbar-track{background:transparent}

.date-divider{text-align:center;color:var(--muted);font-size:12px;font-weight:700;padding:14px 0;display:flex;align-items:center;justify-content:center;gap:12px}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:#3f4147;max-width:200px}

.sys{text-align:center;color:var(--muted);font-size:12px;padding:6px 0;margin:2px 0;display:flex;align-items:center;gap:10px;justify-content:center}
.sys::before,.sys::after{content:'';height:1px;background:#2e3035;width:40px}

.msg-wrap{display:flex;gap:14px;padding:2px 16px;border-radius:2px;transition:background .1s;position:relative}
.msg-wrap:hover{background:var(--msg-hover)}
.msg-av{width:40px;height:40px;font-size:24px;flex-shrink:0;align-self:flex-start;margin-top:3px;display:flex;align-items:center;justify-content:center}
.msg-body{flex:1;min-width:0}
.msg-head{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.msg-author{font-size:14px;font-weight:700}
.msg-ts{color:var(--muted);font-size:11px}
.msg-text{color:var(--text);font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.msg-cont{padding:1px 16px;transition:background .1s}
.msg-cont:hover{background:var(--msg-hover)}
.msg-cont-inner{padding-left:54px}

.reactions-bar{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.react-chip{background:#2e3035;border:1px solid #3f4147;border-radius:12px;padding:2px 9px;font-size:13px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-family:inherit}
.react-chip:hover,.react-chip.mine{background:#404775;border-color:var(--accent)}
.react-chip .rc{color:var(--white);font-size:11px;font-weight:700}

.quick-reacts{display:none;gap:3px;margin-top:4px;align-items:center}
.msg-wrap:hover .quick-reacts,.msg-cont:hover .quick-reacts{display:flex}
.qr{background:#2e3035;border:1px solid #3f4147;border-radius:8px;padding:3px 7px;font-size:15px;cursor:pointer;transition:background .1s;font-family:inherit;line-height:1}
.qr:hover{background:#404775;border-color:var(--accent)}

/* ── Input ── */
#typing-row{height:24px;padding:0 16px;display:flex;align-items:center;flex-shrink:0}
.typing-text{color:var(--muted);font-size:12px}
.typing-text b{color:#dbdee1;font-weight:700}
.bounce span{display:inline-block;animation:bop .8s infinite ease-in-out}
.bounce span:nth-child(2){animation-delay:.12s}
.bounce span:nth-child(3){animation-delay:.24s}
@keyframes bop{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-3px)}}
#input-row{padding:0 16px 16px;flex-shrink:0}
.input-shell{background:var(--input-bg);border-radius:8px;display:flex;align-items:center;padding:0 14px;gap:10px}
#msg-in{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-size:14px;padding:13px 0;font-family:inherit}
#msg-in::placeholder{color:var(--muted)}
#msg-in:disabled{cursor:not-allowed;opacity:.5}
.send-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:5px;border-radius:5px;transition:color .15s;display:flex;align-items:center;line-height:1}
.send-btn:hover{color:var(--text)}
.send-btn.active{color:var(--accent)}
.icon-btn{color:var(--muted);font-size:20px;cursor:pointer;transition:color .15s;line-height:1}
.icon-btn:hover{color:var(--text)}
</style>
</head>
<body>

<div id="app">
  <!-- Setup -->
  <div id="setup-screen">
    <div class="setup-card">
      <h2>Join the chat</h2>
      <p class="sub">Pick a username and avatar to get started</p>
      <div class="field-label">Username</div>
      <input class="setup-input" id="uname" type="text" placeholder="e.g. coolperson" maxlength="20" autocomplete="off" spellcheck="false" />
      <div class="field-label" style="margin-top:20px">Avatar</div>
      <div class="avatar-grid" id="av-grid"></div>
      <button class="join-btn" id="join-btn" disabled>Let's go →</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-screen">
    <div id="top-bar">
      <div class="channel-name"><span class="hash">#</span>general</div>
      <div class="sep"></div>
      <div class="topic">Hang out, chat, vibe ✨</div>
      <span class="pill" id="online-pill">0 online</span>
      <div class="conn-badge loading" id="conn-badge">connecting</div>
    </div>
    <div id="body">
      <div id="sidebar">
        <div class="sb-section">Members — <span id="mc">0</span></div>
        <div id="mb-list"></div>
        <div id="my-info">
          <div class="my-av" id="my-av-sm"></div>
          <div style="flex:1;min-width:0">
            <div id="my-name-sm"></div>
            <div class="my-status">● Online</div>
          </div>
        </div>
      </div>
      <div id="main">
        <div id="msgs">
          <div style="padding:24px 16px 16px;border-bottom:1px solid #3f4147;margin-bottom:16px">
            <div style="font-size:40px;margin-bottom:10px">#</div>
            <div style="color:var(--white);font-size:20px;font-weight:800;margin-bottom:4px">Welcome to #general</div>
            <div style="color:var(--muted);font-size:14px">This is the start of the channel. Say hi!</div>
          </div>
        </div>
        <div id="typing-row"></div>
        <div id="input-row">
          <div class="input-shell">
            <i class="ti ti-circle-plus icon-btn" aria-hidden="true"></i>
            <input id="msg-in" type="text" placeholder="Message #general" maxlength="400" disabled />
            <i class="ti ti-mood-smile icon-btn" aria-hidden="true"></i>
            <button class="send-btn" id="send-btn" aria-label="Send"><i class="ti ti-send"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const AVLIST   = ['🦊','🐉','🐙','🤖','👾'];
const AVCOLORS = ['#f0a732','#5865f2','#57c7e3','#e74c6b','#23a559'];
const QUICK    = ['👍','❤️','😂','🔥','😮'];
const POLL_MS  = 2500;
const PRES_TTL = 18000;
const TYPE_TTL = 5000;
const MAX_MSGS = 150;
const STORE_MSGS = 'dc_msgs_v4';
const STORE_PRES = 'dc_pres_v4';

let me = null;
let pollTimer = null, presTimer = null, typTimer = null;
let isTyping = false;
let lastHash = { msgs:'', pres:'', typing:'' };

const $ = id => document.getElementById(id);
const msgsEl = $('msgs'), mbList = $('mb-list'), typingRow = $('typing-row');
const msgIn = $('msg-in'), sendBtn = $('send-btn');
const connBadge = $('conn-badge');

/* ── Avatar picker ── */
let selAv = null;
AVLIST.forEach((em,i) => {
  const b = document.createElement('button');
  b.className = 'av-btn'; b.textContent = em; b.type = 'button';
  b.onclick = () => {
    document.querySelectorAll('.av-btn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); selAv = i; checkJoin();
  };
  $('av-grid').appendChild(b);
});

$('uname').addEventListener('input', checkJoin);
$('uname').addEventListener('keydown', e => { if(e.key==='Enter') $('join-btn').click(); });

function checkJoin(){
  $('join-btn').disabled = !($('uname').value.trim().length >= 2 && selAv !== null);
}

$('join-btn').onclick = async () => {
  const name = $('uname').value.trim();
  if(!name || selAv === null) return;
  me = { id: uid(), name, avIdx: selAv, color: AVCOLORS[selAv], joined: Date.now() };
  $('setup-screen').style.display = 'none';
  const cs = $('chat-screen');
  cs.style.display = 'flex'; cs.style.flexDirection = 'column'; cs.style.flex = '1'; cs.style.overflow = 'hidden';
  $('my-av-sm').textContent = AVLIST[me.avIdx];
  $('my-name-sm').textContent = me.name;
  msgIn.disabled = false; msgIn.focus();
  await postSystem(`${AVLIST[me.avIdx]} ${name} joined the chat`);
  await setPresence(true);
  startPolling();
};

/* ── Utilities ── */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function now(){ return Date.now(); }
function fmt(t){ return new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(t){
  const d = new Date(t), n = new Date();
  if(d.toDateString()===n.toDateString()) return 'Today';
  const y = new Date(n); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'});
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hash(v){ return JSON.stringify(v); }

/* ── Storage helpers ── */
async function sget(k){
  try{ const r = await window.storage.get(k, true); return r ? JSON.parse(r.value) : null; }
  catch{ return null; }
}
async function sset(k,v){
  try{ await window.storage.set(k, JSON.stringify(v), true); return true; }
  catch{ return false; }
}

/* ── Messages ── */
async function loadMsgs(){ return (await sget(STORE_MSGS)) || []; }
async function saveMsgs(msgs){ await sset(STORE_MSGS, msgs.slice(-MAX_MSGS)); }

async function postMessage(text){
  const msgs = await loadMsgs();
  msgs.push({ id:uid(), uid:me.id, name:me.name, avIdx:me.avIdx, color:me.color, text, ts:now(), type:'msg', reactions:{} });
  await saveMsgs(msgs);
}
async function postSystem(text){
  const msgs = await loadMsgs();
  msgs.push({ id:uid(), uid:'sys', text, ts:now(), type:'sys' });
  await saveMsgs(msgs);
}

/* ── Reactions ── */
async function toggleReact(msgId, emoji){
  const msgs = await loadMsgs();
  const msg = msgs.find(m=>m.id===msgId);
  if(!msg) return;
  if(!msg.reactions) msg.reactions = {};
  const arr = msg.reactions[emoji] || [];
  const idx = arr.indexOf(me.id);
  if(idx>-1) arr.splice(idx,1); else arr.push(me.id);
  if(arr.length) msg.reactions[emoji] = arr; else delete msg.reactions[emoji];
  await saveMsgs(msgs);
  await poll();
}
window.doReact = (id,em) => toggleReact(id,em);

/* ── Presence ── */
async function setPresence(active=true){
  if(!me) return;
  const data = (await sget(STORE_PRES)) || {};
  if(active){
    data[me.id] = { id:me.id, name:me.name, avIdx:me.avIdx, color:me.color, ts:now(), typing:isTyping };
  } else {
    delete data[me.id];
  }
  await sset(STORE_PRES, data);
}
async function loadPresence(){
  const data = (await sget(STORE_PRES)) || {};
  return Object.values(data).filter(u => now()-u.ts < PRES_TTL);
}

/* ── Typing ── */
async function setTyping(active){
  if(!me) return;
  isTyping = active;
  await setPresence(true);
}

/* ── Polling loop ── */
async function poll(){
  if(!me) return;
  try{
    const [msgs, presence] = await Promise.all([loadMsgs(), loadPresence()]);
    const mh = hash(msgs), ph = hash(presence);
    const typers = presence.filter(u=>u.id!==me.id && u.typing && now()-u.ts<TYPE_TTL);
    const th = hash(typers.map(u=>u.name));
    if(mh !== lastHash.msgs){ lastHash.msgs=mh; renderMsgs(msgs); }
    if(ph !== lastHash.pres){ lastHash.pres=ph; renderMembers(presence); }
    if(th !== lastHash.typing){ lastHash.typing=th; renderTyping(typers); }
    connBadge.textContent='live'; connBadge.className='conn-badge live';
  } catch(e){
    connBadge.textContent='error'; connBadge.className='conn-badge err';
  }
}

function startPolling(){
  poll();
  pollTimer  = setInterval(poll, POLL_MS);
  presTimer  = setInterval(()=>setPresence(true), 8000);
}

/* ── Render messages ── */
function renderMsgs(msgs){
  const atBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 100;
  const welcomeEl = msgsEl.querySelector('.welcome-block');
  msgsEl.innerHTML = '';
  if(welcomeEl) msgsEl.appendChild(welcomeEl);

  let prevAuthor=null, prevTime=0, prevDate=null;

  msgs.forEach(msg => {
    const d = fmtDate(msg.ts);
    if(d !== prevDate){
      const el = document.createElement('div');
      el.className='date-divider'; el.textContent=d;
      msgsEl.appendChild(el); prevDate=d; prevAuthor=null;
    }
    if(msg.type==='sys'){
      const el=document.createElement('div'); el.className='sys'; el.textContent=msg.text;
      msgsEl.appendChild(el); prevAuthor=null; prevTime=0; return;
    }
    const grouped = msg.uid===prevAuthor && (msg.ts-prevTime)<420000;
    const reactBar = buildReactions(msg);
    const quickRow = `<div class="quick-reacts">${QUICK.map(e=>`<button class="qr" onclick="doReact('${msg.id}','${e}')" title="${e}">${e}</button>`).join('')}</div>`;

    if(!grouped){
      const el=document.createElement('div'); el.className='msg-wrap';
      el.innerHTML=`
        <div class="msg-av">${AVLIST[msg.avIdx]||'?'}</div>
        <div class="msg-body">
          <div class="msg-head">
            <span class="msg-author" style="color:${msg.color}">${esc(msg.name)}</span>
            <span class="msg-ts">${fmt(msg.ts)}</span>
          </div>
          <div class="msg-text">${esc(msg.text)}</div>
          ${reactBar}${quickRow}
        </div>`;
      msgsEl.appendChild(el);
    } else {
      const el=document.createElement('div'); el.className='msg-cont';
      el.innerHTML=`<div class="msg-cont-inner"><div class="msg-text">${esc(msg.text)}</div>${reactBar}${quickRow}</div>`;
      msgsEl.appendChild(el);
    }
    prevAuthor=msg.uid; prevTime=msg.ts;
  });

  if(atBottom) msgsEl.scrollTop = msgsEl.scrollHeight;
}

function buildReactions(msg){
  if(!msg.reactions || !Object.keys(msg.reactions).length) return '';
  const chips = Object.entries(msg.reactions)
    .filter(([,users])=>users.length)
    .map(([em,users])=>{
      const mine = users.includes(me?.id);
      return `<button class="react-chip${mine?' mine':''}" onclick="doReact('${msg.id}','${em}')">${em}<span class="rc">${users.length}</span></button>`;
    }).join('');
  return chips ? `<div class="reactions-bar">${chips}</div>` : '';
}

/* ── Render members ── */
function renderMembers(presence){
  mbList.innerHTML='';
  const sorted=[...presence].sort((a,b)=>{
    if(a.id===me?.id) return -1;
    if(b.id===me?.id) return 1;
    return a.name.localeCompare(b.name);
  });
  $('mc').textContent = sorted.length;
  $('online-pill').textContent = sorted.length+' online';
  sorted.forEach(u=>{
    const isMe=u.id===me?.id;
    const row=document.createElement('div'); row.className='member-row';
    row.innerHTML=`
      <div class="av">${AVLIST[u.avIdx]||'?'}<div class="dot"></div></div>
      <div class="mb-info">
        <div class="mb-name${isMe?' me':''}">${esc(u.name)}${isMe?'<span class="mb-tag">you</span>':''}</div>
        <div class="mb-status">${u.typing&&!isMe?'<span style="color:#57c7e3">typing…</span>':'Online'}</div>
      </div>`;
    mbList.appendChild(row);
  });
}

/* ── Render typing ── */
function renderTyping(typers){
  if(!typers.length){ typingRow.innerHTML=''; return; }
  const names=typers.map(u=>`<b>${esc(u.name)}</b>`).join(', ');
  const verb=typers.length===1?'is':'are';
  typingRow.innerHTML=`<div class="typing-text">${names} ${verb} typing<span class="bounce"><span>.</span><span>.</span><span>.</span></span></div>`;
}

/* ── Send ── */
async function send(){
  const text=msgIn.value.trim(); if(!text||!me) return;
  msgIn.value=''; sendBtn.className='send-btn';
  await setTyping(false); clearTimeout(typTimer);
  await postMessage(text); await poll();
}

msgIn.addEventListener('input', ()=>{
  sendBtn.className='send-btn'+(msgIn.value.trim()?' active':'');
  if(!me) return;
  clearTimeout(typTimer);
  if(msgIn.value.trim() && !isTyping) setTyping(true);
  typTimer = setTimeout(()=>setTyping(false), 3000);
});
msgIn.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
sendBtn.addEventListener('click', send);

window.addEventListener('pagehide', ()=>{
  if(me){ clearInterval(pollTimer); clearInterval(presTimer); setPresence(false); }
});
</script>
</body>
